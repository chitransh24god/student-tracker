{% extends "base.html" %}

{% block title %}Login - Student Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to your account</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="role">Login As *</label>
                <select id="role" name="role" class="form-control" required onchange="updatePlaceholder()">
                    <option value="">Select your role</option>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-control" 
                    placeholder="you@example.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-control" 
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary btn-large">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('signup') }}">Sign up here</a></p>
        </div>
    </div>
</div>

<script>
function updatePlaceholder() {
    const role = document.getElementById('role').value;
    const emailInput = document.getElementById('email');
    
    if (role === 'student') {
        emailInput.placeholder = 'student@example.com';
    } else if (role === 'teacher') {
        emailInput.placeholder = 'teacher@example.com';
    } else if (role === 'admin') {
        emailInput.placeholder = 'admin@example.com';
    } else {
        emailInput.placeholder = 'you@example.com';
    }
}
</script>
{% endblock %}
