{% extends "base.html" %}

{% block title %}Page Not Found - Student Tracker{% endblock %}

{% block content %}
<div class="container">
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
    </div>
</div>

<style>
.error-container {
    text-align: center;
    padding: 80px 20px;
}

.error-code {
    font-size: 120px;
    font-weight: 700;
    color: #4F46E5;
    opacity: 0.3;
    margin-bottom: 20px;
}

.error-container h1 {
    font-size: 36px;
    margin-bottom: 10px;
    color: #333;
}

.error-container p {
    font-size: 18px;
    color: #666;
    margin-bottom: 30px;
}
</style>
{% endblock %}
